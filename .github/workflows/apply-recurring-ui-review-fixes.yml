name: Apply recurring UI review fixes

on:
  push:
    branches:
      - agent/recurring-orders-ui

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/recurring-orders-ui

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply review fixes
        run: node scripts/apply-recurring-ui-review-fixes.mjs

      - name: Commit fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/RecurringOrderModal.tsx src/RecurringOrdersList.tsx
          git commit -m "fix: improve recurring UI loading and tax defaults"
          git push origin HEAD:agent/recurring-orders-ui
